name: Publish Kit reusable

on:
  workflow_call:

# GitHub Release immutability must be enabled as a repository setting before activation.
# This workflow rejects existing Releases and never attempts to change that setting.

jobs:
  context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      slug: ${{ steps.policy.outputs.slug }}
      version: ${{ steps.policy.outputs.version }}
      channel: ${{ steps.policy.outputs.channel }}
      runner: ${{ steps.policy.outputs.runner }}
      kit-id: ${{ steps.policy.outputs.kit-id }}
      label: ${{ steps.policy.outputs.label }}
      summary: ${{ steps.policy.outputs.summary }}
      tag: ${{ steps.policy.outputs.tag }}
    steps:
      - name: Checkout exact Kit Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require Tag Commit on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git rev-parse --verify origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Pin npm
        run: |
          npm install --global npm@10.9.3
          test "$(npm --version)" = 10.9.3

      - name: Build strict policy loader
        run: |
          npm ci --ignore-scripts
          npm run build -w @itharbors/kit-core

      - name: Validate Tag and official Kit policy
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          import semver from 'semver';
          import { loadOfficialKit } from './scripts/lib/kit-monorepo.mjs';

          const match = /^refs\/tags\/kit\/([a-z0-9][a-z0-9-]*)\/v(.+)$/u.exec(process.env.GITHUB_REF);
          if (!match) throw new Error('Publication requires exact refs/tags/kit/{slug}/v{version}');
          const [, slug, version] = match;
          if (semver.valid(version) !== version || version.includes('+')) {
            throw new Error('Publication Tag version must be canonical SemVer without build metadata');
          }
          const kit = await loadOfficialKit({ repositoryRoot: process.env.GITHUB_WORKSPACE, slug });
          if (kit.id !== `@itharbors/kit-${slug}` || kit.manifest.version !== version) {
            throw new Error('Tag, Kit manifest, package, and policy identities must match');
          }
          const prerelease = semver.prerelease(version);
          if (
            (kit.manifest.channel === 'preview' && prerelease === null)
            || (kit.manifest.channel === 'stable' && prerelease !== null)
          ) throw new Error('Kit channel must match the Tag SemVer channel');

          const values = {
            slug,
            version,
            channel: kit.manifest.channel,
            runner: kit.runner,
            'kit-id': kit.id,
            label: kit.label,
            summary: kit.summary,
            tag: process.env.GITHUB_REF.slice('refs/tags/'.length),
          };
          const unsafeOutput = /[\u0000-\u001f\u007f-\u009f\u2028\u2029]/u;
          for (const [key, value] of Object.entries(values)) {
            if (typeof value !== 'string' || value.length === 0 || unsafeOutput.test(value)) {
              throw new Error(`Unsafe GitHub output value: ${key}`);
            }
            appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`, 'utf8');
          }
          NODE

  prepare:
    needs: context
    runs-on: ${{ needs.context.outputs.runner }}
    permissions:
      contents: read
    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}
      channel: ${{ needs.context.outputs.channel }}
      tag: ${{ needs.context.outputs.tag }}
      version: ${{ needs.context.outputs.version }}
    env:
      KIT_NAME: ${{ needs.context.outputs.slug }}
      KIT_ID: ${{ needs.context.outputs.kit-id }}
      EXPECTED_CHANNEL: ${{ needs.context.outputs.channel }}
      EXPECTED_VERSION: ${{ needs.context.outputs.version }}
      RELEASE_TAG: ${{ needs.context.outputs.tag }}
    steps:
      - name: Checkout exact Kit Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Pin npm
        run: |
          npm install --global npm@10.9.3
          test "$(npm --version)" = 10.9.3

      - name: Install locked dependencies
        run: npm ci

      - name: Run the targeted Kit check
        shell: bash
        run: npm run kit:check -- "$KIT_NAME" --output-directory "$RUNNER_TEMP/kit-check"

      - name: Inspect targeted check artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          check_files=("$RUNNER_TEMP/kit-check"/*)
          check_artifacts=("$RUNNER_TEMP/kit-check"/*.hkit)
          if [[ "${#check_files[@]}" -ne 1 || "${#check_artifacts[@]}" -ne 1 ]]; then
            echo 'Targeted Kit check must produce exactly one .hkit' >&2
            exit 1
          fi
          node packages/kit-cli/dist/cli.js inspect "${check_artifacts[0]}" --json \
            > "$RUNNER_TEMP/check-inspection.json"

      - name: Prepare publication quartet
        id: package
        shell: bash
        env:
          KIT_LABEL: ${{ needs.context.outputs.label }}
          KIT_SUMMARY: ${{ needs.context.outputs.summary }}
        run: |
          set -euo pipefail
          node scripts/kit-publish.mjs prepare \
            --kit-directory "kits/$KIT_NAME" \
            --output-directory "$RUNNER_TEMP/kit-release" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --workflow "$GITHUB_WORKFLOW_REF" \
            --signer-workflow itharbors/harbors/.github/workflows/publish-kit-reusable.yml@refs/tags/kit-publish-v2 \
            --ref "$GITHUB_REF" \
            --tag "$RELEASE_TAG" \
            --label "$KIT_LABEL" \
            --summary "$KIT_SUMMARY" \
            | tee "$RUNNER_TEMP/prepare-output"

          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';

          const lines = readFileSync(`${process.env.RUNNER_TEMP}/prepare-output`, 'utf8').trim().split('\n');
          const outputs = new Map();
          for (const line of lines) {
            const separator = line.indexOf('=');
            if (separator <= 0) throw new Error('Prepare output is malformed');
            const key = line.slice(0, separator);
            const value = line.slice(separator + 1);
            if (outputs.has(key) || /[\u0000-\u001f\u007f-\u009f\u2028\u2029]/u.test(value)) {
              throw new Error('Prepare output is unsafe');
            }
            outputs.set(key, value);
          }
          const expectedKeys = [
            'ARTIFACT_NAME', 'ARTIFACT_SHA256', 'CHANNEL', 'REGISTRY_ENTRY',
            'RELEASE_MANIFEST', 'SBOM', 'TAG', 'VERSION',
          ];
          if (
            outputs.size !== expectedKeys.length
            || expectedKeys.some((key) => !outputs.has(key))
            || outputs.get('CHANNEL') !== process.env.EXPECTED_CHANNEL
            || outputs.get('TAG') !== process.env.RELEASE_TAG
            || outputs.get('VERSION') !== process.env.EXPECTED_VERSION
          ) throw new Error('Prepare outputs do not match validated Tag context');
          appendFileSync(process.env.GITHUB_OUTPUT, `artifact-name=${outputs.get('ARTIFACT_NAME')}\n`, 'utf8');
          NODE

      - name: Inspect and verify prepared publication
        shell: bash
        env:
          ARTIFACT_NAME: ${{ steps.package.outputs.artifact-name }}
        run: |
          set -euo pipefail
          node packages/kit-cli/dist/cli.js inspect \
            "$RUNNER_TEMP/kit-release/$ARTIFACT_NAME" --json \
            > "$RUNNER_TEMP/release-inspection.json"
          node --input-type=module <<'NODE'
          import { readFileSync, readdirSync } from 'node:fs';
          import path from 'node:path';
          import { deriveArtifactName } from './scripts/lib/kit-publish/metadata.mjs';

          const temporary = process.env.RUNNER_TEMP;
          const check = JSON.parse(readFileSync(`${temporary}/check-inspection.json`, 'utf8'));
          const prepared = JSON.parse(readFileSync(`${temporary}/release-inspection.json`, 'utf8'));
          const release = JSON.parse(readFileSync(`${temporary}/kit-release/release.json`, 'utf8'));
          const entry = JSON.parse(readFileSync(`${temporary}/kit-release/registry-entry.json`, 'utf8'));
          const artifactName = process.env.ARTIFACT_NAME;
          const expectedArtifactName = deriveArtifactName(prepared.manifest);
          const expectedFiles = [artifactName, 'registry-entry.json', 'release.json', 'sbom.spdx.json'].sort();
          const actualFiles = readdirSync(`${temporary}/kit-release`).sort();
          if (
            check.manifest.id !== process.env.KIT_ID
            || check.manifest.version !== process.env.EXPECTED_VERSION
            || check.manifest.channel !== process.env.EXPECTED_CHANNEL
            || prepared.manifest.id !== process.env.KIT_ID
            || prepared.manifest.version !== process.env.EXPECTED_VERSION
            || prepared.manifest.channel !== process.env.EXPECTED_CHANNEL
            || release.id !== process.env.KIT_ID
            || release.version !== process.env.EXPECTED_VERSION
            || release.channel !== process.env.EXPECTED_CHANNEL
            || entry.id !== process.env.KIT_ID
            || entry.version !== process.env.EXPECTED_VERSION
            || entry.channel !== process.env.EXPECTED_CHANNEL
            || artifactName !== expectedArtifactName
            || path.basename(`${temporary}/kit-release/${artifactName}`) !== expectedArtifactName
            || JSON.stringify(actualFiles) !== JSON.stringify(expectedFiles)
          ) throw new Error('Tag, Kit manifest, package, and artifact versions must match');
          NODE

      - name: Transfer publication bundle
        uses: actions/upload-artifact@v7
        with:
          name: kit-publication
          path: ${{ runner.temp }}/kit-release
          if-no-files-found: error
          retention-days: 1

  publish-preview:
    if: needs.context.outputs.channel == 'preview'
    needs: [context, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download publication bundle
        uses: actions/download-artifact@v8
        with:
          name: kit-publication
          path: ${{ runner.temp }}/kit-release

      - name: Attest Kit and Release manifest
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ runner.temp }}/kit-release/${{ needs.prepare.outputs.artifact-name }}
            ${{ runner.temp }}/kit-release/release.json

      - name: Create immutable Preview Release
        shell: bash
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact-name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          KIT_LABEL: ${{ needs.context.outputs.label }}
          TAG: ${{ needs.context.outputs.tag }}
          VERSION: ${{ needs.context.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Preview Release already exists: $TAG" >&2
            exit 1
          fi
          gh release create "$TAG" \
            "$RUNNER_TEMP/kit-release/$ARTIFACT_NAME" \
            "$RUNNER_TEMP/kit-release/release.json" \
            "$RUNNER_TEMP/kit-release/sbom.spdx.json" \
            "$RUNNER_TEMP/kit-release/registry-entry.json" \
            --verify-tag \
            --prerelease \
            --title "$KIT_LABEL $VERSION Preview" \
            --notes "Automated immutable Kit Preview from $GITHUB_SHA."

  publish-stable:
    if: needs.context.outputs.channel == 'stable'
    needs: [context, prepare]
    runs-on: ubuntu-latest
    environment:
      name: kit-stable
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download publication bundle
        uses: actions/download-artifact@v8
        with:
          name: kit-publication
          path: ${{ runner.temp }}/kit-release

      - name: Attest Kit and Release manifest
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ runner.temp }}/kit-release/${{ needs.prepare.outputs.artifact-name }}
            ${{ runner.temp }}/kit-release/release.json

      - name: Create immutable Stable Release
        shell: bash
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact-name }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          KIT_LABEL: ${{ needs.context.outputs.label }}
          TAG: ${{ needs.context.outputs.tag }}
          VERSION: ${{ needs.context.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Stable Release already exists: $TAG" >&2
            exit 1
          fi
          gh release create "$TAG" \
            "$RUNNER_TEMP/kit-release/$ARTIFACT_NAME" \
            "$RUNNER_TEMP/kit-release/release.json" \
            "$RUNNER_TEMP/kit-release/sbom.spdx.json" \
            "$RUNNER_TEMP/kit-release/registry-entry.json" \
            --verify-tag \
            --title "$KIT_LABEL $VERSION" \
            --notes "Reviewed immutable Kit Release from $GITHUB_SHA."

  publish-registry:
    needs: [publish-preview, publish-stable]
    if: ${{ always() && ((needs.publish-preview.result == 'success' && needs.publish-stable.result == 'skipped') || (needs.publish-stable.result == 'success' && needs.publish-preview.result == 'skipped')) }}
    permissions:
      contents: read
      attestations: read
      pages: write
      id-token: write
    uses: itharbors/harbors/.github/workflows/publish-kit-registry.yml@kit-publish-v2
    secrets: inherit
