name: Publish Kit Registry

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: kit-registry-pages
  cancel-in-progress: false

# GitHub Release immutability must be enabled as a repository setting before activation.
# This workflow consumes immutable Releases and never attempts to change that setting.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout main governance state
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Pin npm
        run: |
          npm install --global npm@10.9.3
          test "$(npm --version)" = 10.9.3

      - name: Install Registry scanner dependencies
        run: npm ci --ignore-scripts

      - name: Build Registry scanner tools
        run: |
          npm run build -w @itharbors/kit-core
          npm run build -w @itharbors/kit-cli

      - name: Scan Releases and aggregate Registry
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          site_directory="$RUNNER_TEMP/registry-site"
          mkdir -p "$site_directory"
          node scripts/kit-publish.mjs aggregate \
            --repository-root "$GITHUB_WORKSPACE" \
            --repository "$GITHUB_REPOSITORY" \
            --policy-file registry/policy.json \
            --revocations-file registry/revocations.json \
            --output "$site_directory/index.v1.json" \
            --generated-at "$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload validated Pages index
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/registry-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Registry Pages
        id: deployment
        uses: actions/deploy-pages@v4
