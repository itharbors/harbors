name: CI

on:
  push: {}
  merge_group:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
    paths:
      - 'source/**.ts'
      - 'source/scripts/*.js'
      - '.github/workfows/ci.yaml'

permissions:
  contents: read

jobs:
  check-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.18.0]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
